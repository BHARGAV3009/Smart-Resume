<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    input { padding: 6px; }
    button { padding: 6px 10px; margin-left: 5px; }
    li { margin: 8px 0; }
  </style>
</head>
<body>

<h2>Todo App (Frontend → Spring Boot)</h2>

<input id="title" placeholder="Enter todo title">
<button onclick="addTodo()">Add Todo</button>

<ul id="todoList"></ul>

<script>
  const API_URL = "http://localhost:8080/todos";

  function loadTodos() {
    fetch(API_URL)
      .then(res => res.json())
      .then(todos => {
        const list = document.getElementById("todoList");
        list.innerHTML = "";
        todos.forEach(todo => {
          const li = document.createElement("li");
          li.textContent = todo.title + (todo.completed ? " ✔" : "");
          list.appendChild(li);
        });
      })
      .catch(err => console.error("Error:", err));
  }

  function addTodo() {
    const title = document.getElementById("title").value;

    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: title,
        completed: false
      })
    })
    .then(() => {
      document.getElementById("title").value = "";
      loadTodos();
    });
  }

  // Load todos when page opens
  loadTodos();
</script>

</body>
</html>
